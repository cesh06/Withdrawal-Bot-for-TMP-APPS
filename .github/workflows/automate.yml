name: Precision Withdrawal Bot

on:
  workflow_dispatch:
    # Manual run – the script will skip the date check automatically
    # because we set MANUAL_RUN=true
  schedule:
    # Every day at 06:45 UTC = 08:45 CAT
    - cron: '45 6 * * *'

jobs:
  run-bot:
    # Kill switch at workflow level
    if: vars.ENABLE_BOT != 'false' && vars.ENABLE_BOT != 'FALSE'
    runs-on: ubuntu-latest
    env:
      # Force CAT timezone so datetime.now() works correctly
      TZ: Africa/Kigali

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv

      - name: Install Playwright browsers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libasound2t64
          playwright install chromium

      - name: Show runtime config
        run: |
          echo "=== Bot Configuration ==="
          echo "ENABLE_BOT  : ${{ vars.ENABLE_BOT }}"
          echo "RUN_DATE    : ${{ vars.RUN_DATE }}"
          echo "AMOUNT_796585116 : ${{ vars.AMOUNT_796585116 }}"
          echo "AMOUNT_794968772 : ${{ vars.AMOUNT_794968772 }}"
          echo "Current time (CAT): $(date)"

      - name: Execute bot
        env:
          # Account credentials (secrets)
          SECRET_796585116: ${{ secrets.SECRET_796585116 }}
          SECRET_794968772: ${{ secrets.SECRET_794968772 }}

          # Amounts (variables)
          AMOUNT_796585116: ${{ vars.AMOUNT_796585116 }}
          AMOUNT_794968772: ${{ vars.AMOUNT_794968772 }}

          # Control switches (variables)
          ENABLE_BOT: ${{ vars.ENABLE_BOT }}
          RUN_DATE: ${{ vars.RUN_DATE }}

          # For manual triggers, skip the date check
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && 'TRUE' || 'FALSE' }}

        run: python script.py

      - name: Upload receipt screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: withdrawal-receipts-${{ github.run_id }}
          path: receipt_*.png
          if-no-files-found: ignore

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            error_*.png
            *.log
          if-no-files-found: ignore
